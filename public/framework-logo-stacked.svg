<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 280" width="260" height="280">
  <defs>
    <linearGradient id="s-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1C1917"/>
      <stop offset="100%" stop-color="#0C0A09"/>
    </linearGradient>
    <linearGradient id="s-warm" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="s-bright" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FDBA74"/>
      <stop offset="60%" stop-color="#F97316"/>
    </linearGradient>
  </defs>

  <!-- Icon: dark rounded-square background, 190x190 -->
  <rect x="35" y="10" width="190" height="190" rx="42" ry="42" fill="url(#s-bg)"/>

  <!--
    Gable wall frame — exact geometry from framework-icon.svg.
    Original: centered at origin in 1024-unit coordinate space.
    Scaled by 0.175 to fit within the 190px icon square.
    Translated to icon center (130, 110) with slight downward bias
    to optically center the peaked roof shape.
  -->
  <g transform="translate(130, 110) scale(0.175)" fill="url(#s-warm)">
    <!-- Left rafter -->
    <rect x="-24" y="-330" width="48" height="310"
      rx="24" ry="24"
      transform="rotate(-33, 0, -330)"
      fill="url(#s-bright)"/>
    <!-- Right rafter -->
    <rect x="-24" y="-330" width="48" height="310"
      rx="24" ry="24"
      transform="rotate(33, 0, -330)"
      fill="url(#s-bright)"/>
    <!-- Top plate -->
    <rect x="-320" y="-100" width="640" height="48" rx="24" ry="24"/>
    <!-- Bottom sill plate -->
    <rect x="-320" y="310" width="640" height="48" rx="24" ry="24"/>
    <!-- Left corner stud -->
    <rect x="-320" y="-100" width="48" height="460" rx="24" ry="24"/>
    <!-- Right corner stud -->
    <rect x="272" y="-100" width="48" height="460" rx="24" ry="24"/>
    <!-- Center king stud -->
    <rect x="-24" y="-100" width="48" height="460" rx="24" ry="24"/>
    <!-- Left interior stud -->
    <rect x="-172" y="-100" width="40" height="460" rx="20" ry="20" opacity="0.75"/>
    <!-- Right interior stud -->
    <rect x="132" y="-100" width="40" height="460" rx="20" ry="20" opacity="0.75"/>
  </g>

  <!--
    Wordmark: two-tone split at the camelCase boundary.
    "Frame" in brand orange (#F97316), "Work" in stone-300 (#D6D3D1).
    Center-aligned below the icon.
  -->
  <text x="130" y="252"
    text-anchor="middle"
    font-family="'SF Pro Display', 'Inter', 'Segoe UI', 'Helvetica Neue', 'Arial', sans-serif"
    font-size="46"
    font-weight="700"
    letter-spacing="-0.5">
    <tspan fill="#F97316">Frame</tspan><tspan fill="#D6D3D1">Work</tspan>
  </text>
</svg>
